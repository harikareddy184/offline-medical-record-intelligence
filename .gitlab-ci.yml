workflow:
  auto_cancel:
    on_new_commit: none
  rules:
    - when: always

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

default:
  timeout: 2 minutes

stages:
  - pipeline_1
  - pipeline_2
  - pipeline_3
  - pipeline_4
  - pipeline_5
  - pipeline_6

pipeline_1_failed:
  stage: pipeline_1
  script:
    - python --version
    - python -c "print('Pipeline 1 of 6: intentional failed status')"
    - exit 1

pipeline_2_failed:
  stage: pipeline_2
  when: always
  script:
    - python -c "print('Pipeline 2 of 6: intentional failed status')"
    - exit 1

pipeline_3_failed:
  stage: pipeline_3
  when: always
  script:
    - python -c "print('Pipeline 3 of 6: intentional failed status')"
    - exit 1

pipeline_4_failed:
  stage: pipeline_4
  when: always
  script:
    - python -c "print('Pipeline 4 of 6: intentional failed status')"
    - exit 1

pipeline_5_failed:
  stage: pipeline_5
  when: always
  script:
    - python -c "print('Pipeline 5 of 6: intentional failed status')"
    - exit 1

pipeline_6_failed:
  stage: pipeline_6
  when: always
  script:
    - python -c "print('Pipeline 6 of 6: intentional failed status')"
    - exit 1
