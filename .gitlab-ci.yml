workflow:
  auto_cancel:
    on_new_commit: none
  rules:
    - when: always

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

default:
  timeout: 2 minutes
  tags:
    - "medical analyzer"

stages:
  - setup
  - validate
  - build
  - test
  - security
  - deploy

setup_failed:
  stage: setup
  allow_failure: false
  script:
    - python --version
    - python -c "print('Stage 1 of 6: setup failed intentionally')"
    - exit 1

validate_failed:
  stage: validate
  when: always
  allow_failure: false
  script:
    - python -c "print('Stage 2 of 6: validate failed intentionally')"
    - exit 1

build_failed:
  stage: build
  when: always
  allow_failure: false
  script:
    - python -c "print('Stage 3 of 6: build failed intentionally')"
    - exit 1

test_failed:
  stage: test
  when: always
  allow_failure: false
  script:
    - python -c "print('Stage 4 of 6: test failed intentionally')"
    - exit 1

security_failed:
  stage: security
  when: always
  allow_failure: false
  script:
    - python -c "print('Stage 5 of 6: security failed intentionally')"
    - exit 1

deploy_failed:
  stage: deploy
  when: always
  allow_failure: false
  script:
    - python -c "print('Stage 6 of 6: deploy failed intentionally')"
    - exit 1
