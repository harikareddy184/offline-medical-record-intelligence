workflow:
  rules:
    - when: always

stages:
  - prepare
  - validate
  - compile
  - quality
  - test
  - security

default:
  interruptible: true
  before_script:
    - python --version

prepare_environment:
  stage: prepare
  script:
    - python -m pip --version
    - python -c "import backend; print('backend import ok')"

validate_project_files:
  stage: validate
  script:
    - python scripts/check_metadata.py
    - python scripts/check_docs.py
    - python scripts/check_hackathon_rules.py

compile_python:
  stage: compile
  script:
    - python -m compileall app.py backend scripts tests

quality_checks:
  stage: quality
  script:
    - ruff format --check .
    - black --check .
    - ruff check .
    - mypy backend scripts --ignore-missing-imports

unit_tests:
  stage: test
  script:
    - python -m pytest -q

security_scan:
  stage: security
  script:
    - bandit -r backend scripts -ll
