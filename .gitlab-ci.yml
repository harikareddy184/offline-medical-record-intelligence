workflow:
  rules:
    - when: always

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

stages:
  - smoke

runner_smoke:
  stage: smoke
  tags:
    - offline-medical-record-intelligence-local
  timeout: 2 minutes
  script:
    - Write-Host "Runner description $env:CI_RUNNER_DESCRIPTION"
    - Write-Host "Runner tags $env:CI_RUNNER_TAGS"
    - Write-Host "Project $env:CI_PROJECT_PATH"
    - Write-Host "Commit $env:CI_COMMIT_SHORT_SHA"
    - python --version
