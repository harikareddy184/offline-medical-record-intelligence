workflow:
  rules:
    - when: always

variables:
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

default:
  before_script:
    - python --version
    - python -m pip install --upgrade pip setuptools wheel
    - python -m pip install -r requirements.txt
    - python -m pip install black ruff mypy pytest bandit pip-audit pre-commit

stages:
  - metadata
  - build
  - format
  - lint
  - test
  - compliance
  - security
  - docs

metadata_check:
  stage: metadata
  script:
    - python scripts/check_metadata.py

compile_check:
  stage: build
  script:
    - python -m compileall app.py backend scripts tests

package_import_check:
  stage: build
  script:
    - python -c "from backend.app import build_result; result = build_result('Patient has fever'); assert result['status'] == 'success'; assert result['meta']['runtime'] == 'CPU'"

streamlit_entrypoint_check:
  stage: build
  script:
    - streamlit version
    - python -c "import app; import backend.app; assert callable(app.main)"

ruff_format_check:
  stage: format
  script:
    - ruff format --check .

black_format_check:
  stage: format
  script:
    - black --check .

ruff_lint_check:
  stage: lint
  script:
    - ruff check .

mypy_type_check:
  stage: lint
  script:
    - mypy backend scripts --ignore-missing-imports

pytest_check:
  stage: test
  script:
    - pytest -q

cpu_first_check:
  stage: compliance
  script:
    - python -c "from scripts.check_hackathon_rules import check_cpu_first; check_cpu_first(); print('cpu_first: passed')"

offline_first_check:
  stage: compliance
  script:
    - python -c "from scripts.check_hackathon_rules import check_offline_first; check_offline_first(); print('offline_first: passed')"

strong_copyleft_license_check:
  stage: compliance
  script:
    - python -c "from scripts.check_hackathon_rules import check_strong_copyleft_license; check_strong_copyleft_license(); print('strong_copyleft_license: passed')"

system_package_check:
  stage: compliance
  script:
    - python -c "from scripts.check_hackathon_rules import check_system_packages; check_system_packages(); print('system_packages: passed')"

real_parser_output_check:
  stage: compliance
  script:
    - python -c "from scripts.check_hackathon_rules import check_real_parser_output; check_real_parser_output(); print('real_parser_output: passed')"

bandit_security_check:
  stage: security
  script:
    - bandit -r backend scripts -ll

pip_audit_dependency_check:
  stage: security
  script:
    - pip-audit --no-deps --disable-pip --timeout 10 -r requirements.txt

precommit_check:
  stage: security
  script:
    - pre-commit run --all-files

docs_check:
  stage: docs
  script:
    - python scripts/check_docs.py
