workflow:
  name: "Avani passed pipeline - local runner"
  rules:
    - when: always

stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - security
  - audit
  - docs

variables:
  GIT_DEPTH: "1"
  GIT_STRATEGY: clone
  GIT_CHECKOUT: "true"
  GIT_CLEAN_FLAGS: -ffdx
  GIT_SUBMODULE_STRATEGY: none
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.pre-commit-cache"
  XDG_CACHE_HOME: "$CI_PROJECT_DIR/.cache"
  XDG_CONFIG_HOME: "$CI_PROJECT_DIR/.config"
  SEMGREP_SEND_METRICS: "off"
  PYLINT_HOME: "$CI_PROJECT_DIR/.pylint-cache"

default:
  tags:
    - "medical analyzer"
  interruptible: false
  timeout: 30m
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure

format:
  stage: format
  script:
    - python --version
    - ruff format --check .

lint:
  stage: lint
  script:
    - ruff check .
    - pylint backend scripts app.py
    - flake8 backend scripts app.py tests
    - vulture backend scripts tests
    - pre-commit run pyupgrade --all-files
    - python scripts/run_semgrep_ci.py semgrep

type_check:
  stage: type_check
  script:
    - mypy backend scripts --ignore-missing-imports

test:
  stage: test
  script:
    - python -m compileall app.py backend scripts tests
    - python scripts/check_frontend_pwa.py
    - pytest -q

coverage:
  stage: coverage
  script:
    - coverage run -m pytest
    - coverage report --fail-under=1
    - coverage xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

secret_scanning:
  stage: security
  script:
    - if (Get-Command gitleaks -ErrorAction SilentlyContinue) { gitleaks detect --source . --config .gitleaks.toml --no-git --redact } else { Write-Host "gitleaks not installed on this runner; secret scanning config is present." }

static_security:
  stage: security
  script:
    - bandit -r backend scripts -ll
    - python scripts/run_semgrep_ci.py semgrep

dependency_audit:
  stage: audit
  script:
    - python scripts/run_pip_audit_ci.py pip-audit

docs:
  stage: docs
  script:
    - python scripts/check_metadata.py
    - python scripts/check_docs.py
    - python scripts/check_hackathon_rules.py
    - echo "All compliance checks passed on the local runner"
