workflow:
  rules:
    - when: always

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

default:
  image: python:3.12-slim
  timeout: 5 minutes

stages:
  - smoke

runner_smoke:
  stage: smoke
  script:
    - echo "Runner description ${CI_RUNNER_DESCRIPTION}"
    - echo "Runner tags ${CI_RUNNER_TAGS}"
    - echo "Project ${CI_PROJECT_PATH}"
    - echo "Commit ${CI_COMMIT_SHORT_SHA}"
    - python --version
