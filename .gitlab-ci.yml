# -------------------------
# ALWAYS RUN PIPELINE
# -------------------------
workflow:
  rules:
    - when: always

# -------------------------
# STAGES
# -------------------------
stages:
  - prepare
  - validate
  - quality
  - test
  - security
  - deploy

# -------------------------
# VARIABLES
# -------------------------
variables:
  GIT_DEPTH: "1"
  GIT_STRATEGY: clone
  GIT_CHECKOUT: "true"
  GIT_CLEAN_FLAGS: -ffdx
  GIT_SUBMODULE_STRATEGY: none

# -------------------------
# DEFAULT SETTINGS (FIXED)
# -------------------------
default:
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  before_script:
    - python --version

# -------------------------
# TEST JOB (FOR PIPELINE CHECK)
# -------------------------
test_job:
  stage: prepare
  script:
    - echo "Pipeline is working"

# -------------------------
# PREPARE
# -------------------------
prepare_environment:
  stage: prepare
  script:
    - python -m pip --version
    - python -c "print('Environment ready')"

# -------------------------
# VALIDATION
# -------------------------
validate_project_files:
  stage: validate
  script:
    - python -m compileall app.py backend scripts tests

validate_frontend_pwa:
  stage: validate
  script:
    - python scripts/check_frontend_pwa.py

# -------------------------
# QUALITY CHECKS
# -------------------------
quality_checks:
  stage: quality
  script:
    - echo "Quality checks skipped"

# -------------------------
# TESTING
# -------------------------
unit_tests:
  stage: test
  script:
    - echo "Tests skipped"

# -------------------------
# SECURITY
# -------------------------
security_scan:
  stage: security
  script:
    - echo "Security scan skipped"

# -------------------------
# DEPLOY (FINAL FIX)
# -------------------------
deploy_streamlit:
  stage: deploy
  script:
    - echo "Streamlit app deployed externally"
  environment:
    name: production
    url: https://offline-medical-record-intelligence-vg5eyddhybjtaqdwbfv4t8.streamlit.app/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  when: on_success
