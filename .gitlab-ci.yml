workflow:
  name: "Avani passed-stage pipeline"
  rules:
    - when: always

variables:
  PIPELINE_OWNER: "Avani"

stages:
  - prepare
  - validate
  - quality
  - test
  - security
  - report
  - deploy

variables:
  GIT_DEPTH: "1"
  GIT_STRATEGY: fetch
  GIT_CHECKOUT: "true"
  GIT_SUBMODULE_STRATEGY: none

default:
  tags:
    - "medical analyzer"
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  before_script:
    - python --version

prepare_environment:
  stage: prepare
  script:
    - python -m pip --version
    - python -c "import backend; print('backend import ok')"

validate_project_files:
  stage: validate
  script:
    - python scripts/check_metadata.py
    - python scripts/check_docs.py
    - python scripts/check_hackathon_rules.py
    - python -m compileall app.py backend scripts tests

validate_frontend_pwa:
  stage: validate
  script:
    - python scripts/check_frontend_pwa.py

quality_checks:
  stage: quality
  script:
    - ruff format --check .
    - black --check .
    - ruff check .
    - mypy backend scripts --ignore-missing-imports

unit_tests:
  stage: test
  script:
    - python -m pytest -q

security_scan:
  stage: security
  script:
    - bandit -r backend scripts -ll

pipeline_stage_report:
  stage: report
  needs:
    - prepare_environment
    - validate_project_files
    - validate_frontend_pwa
    - quality_checks
    - unit_tests
    - security_scan
  script:
    - 'Set-Content -Path pipeline-status.txt -Value "pipeline: Avani passed-stage pipeline"'
    - 'Add-Content -Path pipeline-status.txt -Value "owner: $env:PIPELINE_OWNER"'
    - 'Add-Content -Path pipeline-status.txt -Value "prepare: passed"'
    - 'Add-Content -Path pipeline-status.txt -Value "validate: passed"'
    - 'Add-Content -Path pipeline-status.txt -Value "quality: passed"'
    - 'Add-Content -Path pipeline-status.txt -Value "test: passed"'
    - 'Add-Content -Path pipeline-status.txt -Value "security: passed"'
    - Get-Content pipeline-status.txt
  artifacts:
    when: always
    paths:
      - pipeline-status.txt

pages:
  stage: deploy
  needs:
    - pipeline_stage_report
  script:
    - New-Item -ItemType Directory -Force public
    - Copy-Item -Path frontend\* -Destination public -Recurse -Force
  artifacts:
    paths:
      - public
  environment:
    name: production
    url: $CI_PAGES_URL
  only:
    - main
