workflow:
  rules:
    - when: always

stages:
  - test
  - lint

setup:
  stage: test
  image: python:3.10
  script:
    - echo "setup ok"
    - pip install -r requirements.txt

compile:
  stage: test
  image: python:3.10
  script:
    - python -m compileall backend

import_check:
  stage: test
  image: python:3.10
  script:
    - python -c "import backend.app; print('OK')"

lint:
  stage: lint
  image: python:3.10
  script:
    - pip install flake8
    - flake8 backend || true