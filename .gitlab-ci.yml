workflow:
  rules:
    - when: always

stages:
  - setup
  - validate
  - build
  - test
  - security
  - deploy

default:
  tags: []   # ensures no tag restriction
  before_script:
    - echo "🚀 Pipeline started"

setup_job:
  stage: setup
  script:
    - echo "✅ Stage 1: Setup completed"

validate_job:
  stage: validate
  script:
    - echo "✅ Stage 2: Validation completed"

build_job:
  stage: build
  script:
    - echo "✅ Stage 3: Build completed"

test_job:
  stage: test
  script:
    - echo "✅ Stage 4: Testing completed"

security_job:
  stage: security
  script:
    - echo "✅ Stage 5: Security checks completed"

deploy_job:
  stage: deploy
  script:
    - echo "✅ Stage 6: Deployment completed"