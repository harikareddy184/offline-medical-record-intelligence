workflow:
  rules:
    - when: always

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

default:
  interruptible: true

stages:
  - smoke
  - validate
  - build
  - test
  - docs

runner_smoke:
  stage: smoke
  script:
    - Write-Host "Runner description $env:CI_RUNNER_DESCRIPTION"
    - Write-Host "Runner tags $env:CI_RUNNER_TAGS"
    - Write-Host "Project $env:CI_PROJECT_PATH"
    - Write-Host "Commit $env:CI_COMMIT_SHORT_SHA"
    - python --version

metadata_check:
  stage: validate
  script:
    - python scripts/check_metadata.py

compile_check:
  stage: build
  script:
    - python -m compileall app.py backend scripts tests

parser_smoke_check:
  stage: build
  script:
    - python -c "from backend.app import build_result; result = build_result('Patient has fever'); assert result['status'] == 'success'; print(result['data']['medical_analysis']['possible_condition'])"

pytest_check:
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt pytest
  script:
    - pytest -q

docs_check:
  stage: docs
  script:
    - python scripts/check_docs.py
