workflow:
  rules:
    - when: always

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

default:
  timeout: 5 minutes

stages:
  - smoke

runner_smoke:
  stage: smoke
  tags:
    - "medical analyzer"
  script:
    - python --version
    - python -c "import os; print('Runner description', os.getenv('CI_RUNNER_DESCRIPTION', ''))"
    - python -c "import os; print('Runner tags', os.getenv('CI_RUNNER_TAGS', ''))"
    - python -c "import os; print('Project', os.getenv('CI_PROJECT_PATH', ''))"
    - python -c "import os; print('Commit', os.getenv('CI_COMMIT_SHORT_SHA', ''))"
