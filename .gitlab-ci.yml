workflow:
  rules:
    - when: always

stages:
  - prepare
  - validate
  - quality
  - test
  - security
  - deploy

variables:
  GIT_DEPTH: "1"
  GIT_STRATEGY: fetch
  GIT_CHECKOUT: "true"
  GIT_SUBMODULE_STRATEGY: none

default:
  tags:
    - "medical analyzer"
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - unknown_failure
  before_script:
    - python --version

prepare_environment:
  stage: prepare
  script:
    - python -m pip --version
    - python -c "import backend; print('backend import ok')"

validate_project_files:
  stage: validate
  script:
    - python scripts/check_metadata.py
    - python scripts/check_docs.py
    - python scripts/check_hackathon_rules.py
    - python -m compileall app.py backend scripts tests

validate_frontend_pwa:
  stage: validate
  script:
    - python scripts/check_frontend_pwa.py

quality_checks:
  stage: quality
  script:
    - ruff format --check .
    - black --check .
    - ruff check .
    - mypy backend scripts --ignore-missing-imports

unit_tests:
  stage: test
  script:
    - python -m pytest -q

security_scan:
  stage: security
  script:
    - bandit -r backend scripts -ll

pages:
  stage: deploy
  needs:
    - unit_tests
    - security_scan
  script:
    - New-Item -ItemType Directory -Force public
    - Copy-Item -Path frontend\* -Destination public -Recurse -Force
  artifacts:
    paths:
      - public
  environment:
    name: production
    url: $CI_PAGES_URL
  only:
    - main
