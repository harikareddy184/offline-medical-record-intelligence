workflow:
  auto_cancel:
    on_new_commit: none
  rules:
    - when: always

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

default:
  timeout: 2 minutes
  tags:
    - "medical analyzer"

stages:
  - setup
  - validate
  - build
  - test
  - security
  - deploy

setup_stage:
  stage: setup
  script:
    - python --version
    - python -c "print('Stage 1 of 6 passed: setup')"

validate_stage:
  stage: validate
  script:
    - python -c "print('Stage 2 of 6 passed: validate')"

build_stage:
  stage: build
  script:
    - python -c "print('Stage 3 of 6 passed: build')"

test_stage:
  stage: test
  script:
    - python -c "print('Stage 4 of 6 passed: test')"

security_stage:
  stage: security
  script:
    - python -c "print('Stage 5 of 6 passed: security')"

deploy_stage:
  stage: deploy
  script:
    - python -c "print('Stage 6 of 6 passed: deploy')"
