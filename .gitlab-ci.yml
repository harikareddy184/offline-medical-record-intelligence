workflow:
  name: "Avani passed pipeline"
  rules:
    - when: always

stages:
  - validate

variables:
  GIT_DEPTH: "1"
  GIT_STRATEGY: clone
  GIT_CHECKOUT: "true"
  GIT_CLEAN_FLAGS: -ffdx
  GIT_SUBMODULE_STRATEGY: none

default:
  interruptible: false
  timeout: 10m
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure

passed_pipeline:
  stage: validate
  script:
    - python --version
    - python -m compileall app.py backend scripts tests
    - python scripts/check_frontend_pwa.py
    - echo "All pipeline checks passed"
