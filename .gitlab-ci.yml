workflow:
  rules:
    - when: always

stages:
  - setup
  - test
  - lint

setup_job:
  stage: setup
  image: python:3.10
  script:
    - echo "Setting up environment"
    - pip install -r requirements.txt

compile_check:
  stage: test
  image: python:3.10
  script:
    - python -m compileall backend

import_check:
  stage: test
  image: python:3.10
  script:
    - python -c "import backend.app; print('IMPORT OK')"

lint_check:
  stage: lint
  image: python:3.10
  script:
    - pip install flake8
    - flake8 backend || true