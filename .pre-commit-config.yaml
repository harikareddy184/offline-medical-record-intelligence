repos:
  - repo: local
    hooks:
      - id: metadata-check
        name: metadata-check
        entry: python scripts/check_metadata.py
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff-format-check
        entry: python -m ruff format --check .
        language: system
        pass_filenames: false
      - id: ruff-lint
        name: ruff-lint
        entry: python -m ruff check .
        language: system
        pass_filenames: false
      - id: black-check
        name: black-check
        entry: python -m black --check .
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
      - id: compile-backend
        name: compile-backend
        entry: python -m compileall backend
        language: system
        pass_filenames: false
      - id: bandit-security
        name: bandit-security
        entry: python -m bandit -r backend scripts -ll
        language: system
        pass_filenames: false
