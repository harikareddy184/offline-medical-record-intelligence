repos:
  - repo: local
    hooks:
      - id: metadata-check
        name: metadata check
        entry: python scripts/check_metadata.py
        language: system
        pass_filenames: false

      - id: docs-check
        name: docs checklist check
        entry: python scripts/check_docs.py
        language: system
        pass_filenames: false

      - id: hackathon-rules-check
        name: hackathon rules check
        entry: python scripts/check_hackathon_rules.py
        language: system
        pass_filenames: false

      - id: compile-check
        name: python compile check
        entry: python -m compileall app.py backend scripts tests
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        entry: ruff format --check .
        language: system
        pass_filenames: false

      - id: black-format
        name: black format check
        entry: black --check .
        language: system
        pass_filenames: false

      - id: ruff-lint
        name: ruff lint check
        entry: ruff check .
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy type check
        entry: mypy backend scripts --ignore-missing-imports
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: pytest -q
        language: system
        pass_filenames: false

      - id: bandit
        name: bandit security check
        entry: bandit -r backend scripts -ll
        language: system
        pass_filenames: false
