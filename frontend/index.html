<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#14532d" />
  <title>Medical Record Intelligence</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <header class="header">
      <h1>Offline Medical Record Intelligence</h1>
      <p>Browser-based medical text analysis with structured JSON output</p>
    </header>

    <section class="card">
      <h2>Enter Patient Data</h2>
      <textarea id="inputText" placeholder="Paste medical report here..."></textarea>

      <div class="actions">
        <button type="button" onclick="processData()">Analyze Report</button>
        <button type="button" class="secondary" onclick="loadExample()">Load Example</button>
      </div>
    </section>

    <section class="card result">
      <h2>Structured Output</h2>
      <pre id="output">Your results will appear here...</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
