<!DOCTYPE html>
<html>
<head>
    <title>Medical Record Analyzer</title>
</head>
<body>

<h2>Medical Record Analyzer</h2>

<textarea id="inputText" rows="5" cols="40" placeholder="Enter patient text"></textarea><br><br>

<button onclick="sendData()">Analyze</button>

<h3>Result:</h3>
<pre id="result"></pre>

<script>
async function sendData() {
    let text = document.getElementById("inputText").value;

    let response = await fetch("http://127.0.0.1:5000/process", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    });

    let data = await response.json();
    document.getElementById("result").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
