<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Record Intelligence</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="container">

    <header class="header">
      <h1>🩺 Offline Medical Record Intelligence</h1>
      <p>Fast • Secure • Smart Insights</p>
    </header>

    <div class="card">
      <h2>Enter Patient Data</h2>

      <textarea id="inputText" placeholder="Paste medical report here..."></textarea>

      <button onclick="processData()">Analyze Report</button>
    </div>

    <div class="card result">
      <h2>AI Output</h2>
      <pre id="output">Your results will appear here...</pre>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
